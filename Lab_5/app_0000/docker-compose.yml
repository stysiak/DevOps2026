services:

  db:
    image: postgres:latest
    environment:
      POSTGRES_DB: devops_db
      POSTGRES_USER: devops
      POSTGRES_PASSWORD: "password123"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devops -d devops_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://devops:password123@db:5432/devops_db
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
