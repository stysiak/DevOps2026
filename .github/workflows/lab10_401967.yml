name: Terraform Lab 10

on:
  push:
    branches:
      - 'lab10/**'
  workflow_dispatch:

env:
  WORKING_DIR: Lab_10/terraform

jobs:
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform validate

      - name: Check no TODO markers remain
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          remaining=$(grep -rn "← TODO" . 2>/dev/null || true)
          if [ -n "$remaining" ]; then
            echo "::error::Znaleziono niezastapione placeholdery TODO:"
            echo "$remaining"
            exit 1
          fi
          echo "OK: Brak niezastąpionych placeholderów TODO"
