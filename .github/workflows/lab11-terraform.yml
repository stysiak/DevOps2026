name: Terraform Lab 11 — AKS

on:
  push:
    branches:
      - 'lab11/**'
    paths:
      - 'Lab_11/terraform/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Akcja Terraform'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy
      student_index:
        description: 'Numer indeksu (nazwa srodowiska z sekretami). Zostaw puste aby uzyc numeru z nazwy brancha.'
        required: false
        default: ''

# Uprawnienia wymagane przez OIDC — workflow musi moc pytac GitHub o token JWT.
permissions:
  id-token: write   # generowanie tokenu OIDC
  contents: read    # checkout repozytorium

env:
  WORKING_DIR: Lab_11/terraform
  TF_VERSION: "~1.9"

jobs:
  # ----------------------------------------------------------------
  # Job 0: wyciagnij numer indeksu z nazwy brancha
  # Branch format: lab11/<nrIndeksu>  →  environment: <nrIndeksu>
  # ----------------------------------------------------------------
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.extract.outputs.environment }}
    steps:
      - name: Ustal nazwe srodowiska (numer indeksu)
        id: extract
        run: |
          # Priorytet 1: recznie podany numer indeksu przez workflow_dispatch input
          # Priorytet 2: ekstrakcja z nazwy brancha (lab11/123456 → 123456)
          if [ -n "${{ github.event.inputs.student_index }}" ]; then
            INDEX="${{ github.event.inputs.student_index }}"
            echo "Zrodlo: workflow_dispatch input"
          else
            INDEX="${GITHUB_REF_NAME##*/}"
            echo "Zrodlo: nazwa brancha (${GITHUB_REF_NAME})"
          fi
          echo "environment=${INDEX}" >> "$GITHUB_OUTPUT"
          echo "Srodowisko GHA: ${INDEX}"

  # ----------------------------------------------------------------
  # Job 1: walidacja skladni HCL — bez dostepu do Azure
  # ----------------------------------------------------------------
  terraform-validate:
    name: Validate
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init (bez backendu)
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform init -backend=false -upgrade

      - name: Terraform Validate
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform validate

  # ----------------------------------------------------------------
  # Job 2: terraform plan — uzywa srodowiska <nrIndeksu>
  # Sekrety i zmienne sa przechowywane w srodowisku studenta.
  # ----------------------------------------------------------------
  terraform-plan:
    name: Plan
    runs-on: ubuntu-latest
    needs: [setup, terraform-validate]
    # Srodowisko = numer indeksu studenta (wyciagniety z nazwy brancha przez job "setup").
    # Wymagane aby OIDC subject pasowal do federated credential
    # (format: repo:<org>/<repo>:environment:<nrIndeksu>)
    # oraz aby secrets.* i vars.* byly odczytywane z srodowiska studenta.
    environment: ${{ needs.setup.outputs.environment }}

    steps:
      - uses: actions/checkout@v4

      # Logowanie do Azure przez OIDC — bez hasla, bez client_secret.
      # Sekrety pobierane ze srodowiska <nrIndeksu>:
      #   Settings -> Environments -> <nrIndeksu> -> Environment secrets
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        env:
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: terraform init

      - name: Terraform Plan
        working-directory: ${{ env.WORKING_DIR }}
        env:
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_prefix: ${{ vars.TF_PREFIX }}
        run: terraform plan -out=tfplan

      - name: Zapisz plan jako artefakt
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.WORKING_DIR }}/tfplan
          retention-days: 1

  # ----------------------------------------------------------------
  # Job 3: terraform apply — tylko workflow_dispatch z action=apply
  # ----------------------------------------------------------------
  terraform-apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: [setup, terraform-plan]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply'
    environment: ${{ needs.setup.outputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        env:
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: terraform init

      - name: Pobierz artefakt z planem
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.WORKING_DIR }}

      - name: Terraform Apply
        working-directory: ${{ env.WORKING_DIR }}
        env:
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_prefix: ${{ vars.TF_PREFIX }}
        run: terraform apply -auto-approve tfplan

  # ----------------------------------------------------------------
  # Job 4: terraform destroy — tylko workflow_dispatch z action=destroy
  # ----------------------------------------------------------------
  terraform-destroy:
    name: Destroy
    runs-on: ubuntu-latest
    needs: [setup, terraform-validate]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    environment: ${{ needs.setup.outputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        env:
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: terraform init

      - name: Terraform Destroy
        working-directory: ${{ env.WORKING_DIR }}
        env:
          ARM_USE_OIDC: true
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_prefix: ${{ vars.TF_PREFIX }}
        run: terraform destroy -auto-approve
