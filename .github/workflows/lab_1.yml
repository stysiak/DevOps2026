name: lab_1_test

on:
  push:
    branches:
      - TEST
      - main
  pull_request:
    branches:
      - TEST
      - main
    
jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests

      - name: Build Docker image
        run: |
          cd ./Lab_1
          docker build -t lab_1 -f dockerfile .

      - name: Run container
        run: |
          docker run -d --rm --name lab_1 -p 5000:5000 lab_1

      - name: Wait for API to be ready
        run: |
          for i in {1..30}; do
            if curl -fsS -X POST "http://localhost:5000/api/model_0000" \
              -H "Content-Type: application/json" \
              -d '{"input":[[1,2,3,4]]}' >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "API did not become ready in time"
          docker logs lab_1 || true
          exit 1

      - name: Run tests
        run: |
          cd ./Lab_1
          python -m pytest api_test.py

      - name: Stop container
        if: always()
        run: |
          docker stop lab_1 || true
